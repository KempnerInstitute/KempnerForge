# Kempner cluster configuration
#
# Default settings for the Kempner Institute HPC cluster.
# Override per-run via CLI: --train.max_steps=50000

[model]
# Use sensible defaults for H100/H200 GPUs
max_seq_len = 2048

[train]
batch_size = 4
seq_len = 2048
grad_accum_steps = 4
compile_model = true
activation_checkpointing = "full"

[optimizer]
lr = 3e-4
weight_decay = 0.1
fused = true

[scheduler]
name = "cosine"
warmup_steps = 2000
min_lr_ratio = 0.1

[distributed]
# dp_shard = -1 means auto-detect from world_size
dp_shard = -1
dp_replicate = 1
tp = 1
pp = 1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints"
interval = 500
async_mode = "disabled"
keep_last_n = 3

[metrics]
log_interval = 10
enable_wandb = false
enable_tensorboard = false

[profiling]
enable = false
start_step = 50
end_step = 55
