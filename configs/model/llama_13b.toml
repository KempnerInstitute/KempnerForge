# Llama-3 13B model architecture.
# Used by convert_checkpoint.py for DCP <-> HuggingFace conversion.

[model]
dim = 5120
n_layers = 40
n_heads = 40
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 4096
rope_theta = 500000.0
tie_embeddings = false
