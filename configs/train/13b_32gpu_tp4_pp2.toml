# Llama-3 13B — 32 GPUs (8 nodes × 4), TP=4 × PP=2 × FSDP=4.
# 40 layers → 20 per PP stage.
#
# Usage: sbatch --nodes=8 scripts/slurm/multinode.sh configs/train/13b_32gpu_tp4_pp2.toml

[model]
dim = 5120
n_layers = 40
n_heads = 40
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 4096
rope_theta = 500000.0
tie_embeddings = false

[train]
batch_size = 4
seq_len = 4096
max_steps = 20
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 50
min_lr_ratio = 0.1

[data]
dataset_path = "/path/to/tokenized/dataset"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = 4
dp_replicate = 1
tp = 4
pp = 2
pp_schedule = "1f1b"
nccl_timeout_sec = 1200

[checkpoint]
dir = "checkpoints/13b_32gpu_tp4_pp2"
interval = 100
async_mode = "disabled"
keep_last_n = 2

[metrics]
log_interval = 1
enable_wandb = false

[profiling]
enable = false
