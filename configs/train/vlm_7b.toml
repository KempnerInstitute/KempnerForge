# 7B VLM Joint-Decoder on 4x H200 (141 GB/GPU).
#
# Mode: smoke.
#
# max_seq_len allocation (JD/MoT): residual_image_tokens + max_text_len.
# Image tokens prepend the text sequence in the residual stream, so the
# budget must cover both modalities.
#
# Primary 7B VLM config. Activation checkpointing is OFF to trade
# recompute for throughput, and batch_size=16 per GPU uses ~72% of
# H200 VRAM. For memory-tighter setups (fewer GPUs, smaller GPUs,
# larger seq) use vlm_7b_ac.toml instead.
#
# Measured on 4x H200 (200-step smoke on 2k COCO Karpathy captions):
#   memory: ~101 / 140 GB per GPU (72%)
#   throughput: ~41k tok/s, ~46% MFU
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py configs/train/vlm_7b.toml
#
# Default points at a 30-sample COCO val substitute (sayakpaul/coco-30-val-2014)
# so a fresh clone runs without external setup. For real training, override
# the dataset (and tokenizer) via CLI:
#   --data.hf_dataset_name=<dataset> --data.tokenizer_path=<tokenizer>
#
# Swap the vision encoder via [vision_encoder].type: "random" (stub, no
# download), "siglip2", or "clip". When pointing at a real encoder also
# set [vision_encoder].path.

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 50257
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 1024     # 256 image + 512 text (max_text_len default) + headroom
rope_theta = 500000.0
tie_embeddings = false

[vision_encoder]
type = "random"
feature_dim = 1024
num_tokens = 256

[vlm]
arch = "joint_decoder"

[train]
batch_size = 16
seq_len = 768
max_steps = 15
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "none"   # intentionally off to stress VRAM
loss_fn = "cross_entropy"

[optimizer]
name = "adamw"
lr = 1e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 3
min_lr_ratio = 0.1

[data]
hf_dataset_name = "sayakpaul/coco-30-val-2014"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "gpt2"
num_workers = 2
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b"
interval = 1000
keep_last_n = 1

[metrics]
log_interval = 1
enable_wandb = false
enable_tensorboard = false
