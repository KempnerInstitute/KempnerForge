# Llama-3 7B — 16 H200 GPUs (4 nodes × 4), AdamW, FineWeb-Edu.
#
# Pure FSDP (no TP) for maximum throughput.
# Designed for kempner_requeue: frequent checkpointing + auto-resume.
#
# Measured: 150K tok/s, 49% MFU, 72.6/140 GB memory, ~14s/step
# Training budget: 100K steps × 2.1M tokens/step = 210B tokens (~1.3× Chinchilla)
# Estimated wall-clock: ~16 days at 150K tok/s (+ preemption overhead)
# Checkpoint every 500 steps (~2h) — max lost work per preemption
#
# Usage:
#   sbatch scripts/slurm/7b_requeue.sh
#
# Or manually:
#   srun --nodes=4 --ntasks-per-node=4 --gpus-per-node=4 \
#     uv run python scripts/train.py configs/train/7b_16gpu_adamw.toml

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 4096
rope_theta = 500000.0
tie_embeddings = false

[train]
batch_size = 8
seq_len = 4096
max_steps = 100000
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = true
mixed_precision = "bf16"
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 2000
min_lr_ratio = 0.1

[data]
dataset_path = "/n/holylfs06/LABS/kempner_shared/Everyone/testbed/text/fineweb-edu/tokenized/meta-llama-3/default"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/7b_16gpu_adamw"
interval = 500
async_mode = "async_with_pinned_mem"
keep_last_n = 3

[metrics]
log_interval = 10
enable_wandb = true
wandb_project = "kempnerforge"
