# 7B VLM Mixture-of-Transformers (MoT) on 4x H200 (141 GB/GPU).
#
# Per-modality Q/K/V/O + per-modality FFN at every layer; single global
# self-attention mixes both modality streams within each layer
# (Liang et al. 2024 Algorithm 1). Image tokens prepend the text
# sequence; output_slice trims them off the LM head input.
#
# Memory note vs. JD: MoT roughly doubles per-block parameter count
# (one full Q/K/V/O + FFN copy per modality), so batch_size is halved
# relative to vlm_7b.toml at the same activation-checkpointing level.
# Activation checkpointing is OFF here for throughput; switch to
# activation_checkpointing = "full" if VRAM is tight.
#
# Measured on 4x H200 (50-step smoke on 2k COCO Karpathy captions):
#   total params: 14.39 B (~2x 7B JD as expected)
#   memory: ~67.7 / 140 GB per GPU (48%)
#   throughput: ~9k tok/s steady-state
#   MFU: ~10% with the existing JD-shaped MFU formula (per-token cost
#        scales ~linearly with parameter count vs. JD baseline; the
#        formula does not yet account for MoT's per-modality
#        duplication, so the reported MFU underestimates the true
#        utilization by ~2x)
#   loss: 11.6 -> 6.4 over 50 steps (clear convergence on real data)
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py configs/train/vlm_7b_mot.toml
#
# The default hf_dataset_name below points at the public Karpathy COCO
# split for parity with vlm_7b.toml; if that name is unreachable, point
# at any local HF Dataset directory (saved via datasets.save_to_disk):
#   --data.hf_dataset_name=/path/to/local/hf_dataset \
#   --data.hf_dataset_text_field=caption
# Swap the encoder via [model.vlm].vision_encoder = "siglip2" / "clip".

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 50257
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 1024
rope_theta = 500000.0
tie_embeddings = false

[model.vlm]
arch = "mot"
vision_encoder = "random"
feature_dim = 1024
num_tokens = 256

[train]
batch_size = 8
seq_len = 768
max_steps = 200
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "none"
loss_fn = "cross_entropy"

[optimizer]
name = "adamw"
lr = 1e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 5
min_lr_ratio = 0.1

[data]
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "gpt2"
num_workers = 2
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b_mot"
interval = 1000
keep_last_n = 1

[metrics]
log_interval = 1
enable_wandb = false
enable_tensorboard = false
