# 24-GPU MoE stress test: saturate 6x4 H200 GPUs
#
# ~7B total params (8 experts), ~1.8B active. TP=4 (intra-node), DP=6 (inter-node).
# Large batch + long seq_len + gradient accumulation to keep GPUs busy.
#
# Usage (interactive salloc):
#   export MASTER_ADDR=$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n1)
#   export MASTER_PORT=29500
#   srun --ntasks-per-node=4 --gpus-per-node=4 uv run python scripts/train.py configs/train/moe_24gpu.toml

[model]
dim = 2048
n_layers = 24
n_heads = 16
n_kv_heads = 4
vocab_size = 128256
ffn_dim_multiplier = 1.3
max_seq_len = 4096
rope_theta = 500000.0
num_experts = 8
moe_top_k = 2
moe_frequency = 1
moe_router = "softmax_topk"
moe_aux_loss_weight = 0.01

[train]
batch_size = 2
seq_len = 4096
max_steps = 100
grad_accum_steps = 32
grad_clip_norm = 1.0
compile_model = false
mixed_precision = "bf16"
activation_checkpointing = "none"

[optimizer]
lr = 3e-4
weight_decay = 0.1

[scheduler]
warmup_steps = 10
min_lr_ratio = 0.1

[data]
num_workers = 4
pin_memory = true

[distributed]
tp = 4
dp_shard = 6

[checkpoint]
dir = "checkpoints/moe_24gpu"
interval = 50
keep_last_n = 2

[metrics]
log_interval = 5
enable_wandb = false
enable_tensorboard = false
