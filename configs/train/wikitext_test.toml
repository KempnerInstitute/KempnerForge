# Wikitext-103 test run: small model on 4x H200 GPUs.
# Usage: torchrun --nproc_per_node=4 scripts/train.py configs/train/wikitext_test.toml

[model]
dim = 512
n_layers = 8
n_heads = 8
n_kv_heads = 4           # GQA: 4 KV heads for 8 Q heads
vocab_size = 50257        # GPT-2 tokenizer
max_seq_len = 1024

[train]
batch_size = 16
seq_len = 1024
max_steps = 500
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = true
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
fused = true

[scheduler]
name = "cosine"
warmup_steps = 50
min_lr_ratio = 0.1

[data]
dataset_path = "data/wikitext103"
num_workers = 4
pin_memory = true

[distributed]
dp_shard = -1

[checkpoint]
dir = "checkpoints/wikitext_test"
interval = 100
keep_last_n = 3

[metrics]
log_interval = 10
enable_wandb = false
enable_tensorboard = false
