# 7B VLM Cross-Attention on 4x H200 (141 GB/GPU).
#
# Llama-3-V style: text flows through the main self-attention stack
# unchanged; CrossAttentionBlocks are inserted between regular
# transformer blocks at a configurable cadence (default 4 ->
# n_layers=32 yields 8 CA blocks at text positions {3,7,...,31}).
# Text queries cross-attend to image K/V produced by the existing
# vision encoder + adapter. No image prefix, no prefix-embed concat.
#
# CA blocks are zero-initialized at construction (Wo and the MLP
# down_proj), so adding a CA arch on top of a text-only checkpoint
# does not regress text loss at step 0; the model learns a non-zero
# image contribution from there.
#
# Measured on 4x H200 (200-step smoke on 2k COCO Karpathy captions):
#   memory: ~88 / 140 GB per GPU (63%)
#   throughput: ~33k tok/s, ~36% MFU
# Lower MFU/throughput vs vlm_7b.toml is expected: CA's residual
# stream is text-only (seq_len=512 vs 768 for JD = 256 image + 512
# text), so fewer tokens per step. CA also adds 8 cross-attn blocks
# of compute per step.
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py \
#       configs/train/vlm_7b_cross_attn.toml
#
# Defaults point at the public COCO Karpathy split on HF Hub. Override
# the dataset and tokenizer via CLI for other corpora:
#   --data.hf_dataset_name=<dataset> --data.tokenizer_path=<tokenizer>
#
# Swap the vision encoder via [model.vlm].vision_encoder: "random"
# (stub, no download), "siglip2", or "clip". When pointing at a real
# encoder also set vision_encoder_path.

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 50257
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 1024
rope_theta = 500000.0
tie_embeddings = false

[model.vlm]
arch = "cross_attention"
vision_encoder = "random"
feature_dim = 1024           # typical ViT-L/14 hidden size
num_tokens = 256             # 16x16 patches at 224 input (CLS stripped)
adapter_hidden_dim = 0       # 0 = use model.dim (4096)
adapter_activation = "gelu"
max_text_len = 512
# Cross-attention placement. Cadence 4 with n_layers=32 yields 8 CA
# blocks; n_kv_heads=0 resolves to n_heads on the cross path (MHA);
# set a smaller positive value for GQA on the cross path.
cross_attention_every_n_layers = 4
cross_attention_n_heads = 0
cross_attention_n_kv_heads = 0
freeze = [{module = "vision_encoder", frozen = true}]

[train]
batch_size = 16
seq_len = 512                # CA arch: residual stream is text-only (no image prefix)
max_steps = 15
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "none"
loss_fn = "cross_entropy"

[optimizer]
name = "adamw"
lr = 1e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 3
min_lr_ratio = 0.1

[data]
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "gpt2"
num_workers = 2
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b_cross_attn"
interval = 1000              # above max_steps; no checkpoint in this smoke
keep_last_n = 1

[metrics]
log_interval = 1
enable_wandb = false
enable_tensorboard = false
