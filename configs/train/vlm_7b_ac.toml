# 7B VLM Joint-Decoder with activation checkpointing (memory-tight).
#
# Sibling of vlm_7b.toml with activation_checkpointing="full" and a
# smaller batch. Use when memory is tight (fewer GPUs, longer seq_len,
# larger image token count) or when recompute is cheap relative to
# peak-memory savings.
#
# Measured on 4x H200:
#   memory: ~19 / 140 GB per GPU (13%)   # plenty of room to grow batch
#   throughput: ~31k tok/s, ~35% MFU
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py \
#       configs/train/vlm_7b_ac.toml
#
# Defaults point at the public COCO Karpathy split on HF Hub. Override
# the dataset and tokenizer via CLI for other corpora:
#   --data.hf_dataset_name=<dataset> --data.tokenizer_path=<tokenizer>

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 50257          # gpt2 tokenizer vocab
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 1024
rope_theta = 500000.0
tie_embeddings = false

[model.vlm]
arch = "joint_decoder"
vision_encoder = "random"
feature_dim = 1024           # typical ViT-L/14 hidden size
num_tokens = 256             # 16x16 patches at 224 input (CLS stripped)
adapter_hidden_dim = 0       # 0 = use model.dim (4096)
adapter_activation = "gelu"
max_text_len = 512
freeze = [{module = "vision_encoder", frozen = true}]

[train]
batch_size = 8
seq_len = 768                # 256 image + 512 text
max_steps = 20
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = false        # skip compile; the 4-GPU smoke is what we want to see
activation_checkpointing = "full"
loss_fn = "cross_entropy"

[optimizer]
name = "adamw"
lr = 1e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 5
min_lr_ratio = 0.1

[data]
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "gpt2"
num_workers = 2
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b_ac"
interval = 1000              # above max_steps; no checkpoint in this smoke
keep_last_n = 1

[metrics]
log_interval = 1
enable_wandb = false
enable_tensorboard = false
