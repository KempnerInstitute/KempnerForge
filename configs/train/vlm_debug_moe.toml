# VLM + MoE smoke config — tiny LLM with MoE TransformerBlocks +
# random vision encoder + Cross-Attention.
#
# MoE lives in the text TransformerBlocks (every other layer at
# moe_frequency=2). CrossAttentionBlocks remain dense MLPs. The two
# arches compose: image features flow as K/V into CA blocks, while
# the text residual stream routes through both dense and MoE blocks
# at the configured cadence.
#
# Live-tested on this branch:
#   - 1 GPU: CA+MoE forward+backward; CE decreases over 5 steps.
#   - 2 GPU FSDP2: CE 10.4 -> 4.5 over 8 steps; aux_loss bounded.
#   - inner_transformer(wrapper) routes set_moe_step / get_moe_aux_loss
#     through the VLMWrapper without exposing them as wrapper attrs.
#
# Usage:
#   uv run torchrun --nproc_per_node=2 scripts/train.py \
#       configs/train/vlm_debug_moe.toml \
#       --data.hf_dataset_name=<dataset> --data.tokenizer_path=gpt2

[model]
dim = 256
n_layers = 4
n_heads = 4
n_kv_heads = 2
vocab_size = 50257       # gpt2 vocab
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 576        # CA residual stream is text-only -> matches max_text_len
num_experts = 4
moe_top_k = 2
moe_frequency = 2        # MoE every 2 layers; layers 1, 3 are MoE; 0, 2 are dense
moe_router = "softmax_topk"
moe_aux_loss_weight = 0.01

[model.vlm]
arch = "cross_attention"
vision_encoder = "random"
feature_dim = 384
num_tokens = 64
adapter_hidden_dim = 0   # 0 = use model.dim
adapter_activation = "gelu"
max_text_len = 512
cross_attention_every_n_layers = 2
cross_attention_n_heads = 0
cross_attention_n_kv_heads = 0
freeze = [{module = "vision_encoder", frozen = true}]

[train]
batch_size = 2
seq_len = 512
max_steps = 50
grad_accum_steps = 1
grad_clip_norm = 1.0
seed = 42
compile_model = false       # MoE + compile is rejected by JobConfig.validate today
activation_checkpointing = "none"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
fused = false

[scheduler]
name = "cosine"
warmup_steps = 5
min_lr_ratio = 0.1

[data]
# Placeholder; override at the CLI with a real dataset.
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "gpt2"
num_workers = 2
pin_memory = true

[distributed]
dp_shard = -1

[checkpoint]
dir = "checkpoints/vlm_debug_moe"
interval = 25
keep_last_n = 2

[metrics]
log_interval = 5
enable_wandb = false
enable_tensorboard = false
