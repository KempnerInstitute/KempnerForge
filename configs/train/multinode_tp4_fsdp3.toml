# Multi-node training: 3 nodes × 4 GPUs = 12 GPUs
# Parallelism: TP=4 (intra-node, NVLink) × FSDP=3 (inter-node, IB)
# Model: Llama-3 7B architecture with vocab_size=128256
# Dataset: fineweb-edu tokenized with Llama-3 tokenizer (uint32 .bin files)

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
max_seq_len = 4096
norm_type = "rmsnorm"
activation = "silu"
rope_theta = 500000.0
tie_embeddings = false

[train]
batch_size = 4
seq_len = 4096
max_steps = 500
grad_accum_steps = 8
grad_clip_norm = 1.0
seed = 42
compile_model = true
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 50
min_lr_ratio = 0.1

[data]
dataset_path = "/n/holylfs06/LABS/kempner_shared/Everyone/testbed/text/fineweb-edu/tokenized/meta-llama-3/default"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = 3
dp_replicate = 1
tp = 4
pp = 1

[checkpoint]
dir = "checkpoints/multinode_tp4_fsdp3"
interval = 100
async_mode = "async_with_pinned_mem"
keep_last_n = 3

[metrics]
log_interval = 1
enable_wandb = false
enable_tensorboard = false

[profiling]
enable = false
start_step = 5
end_step = 8
