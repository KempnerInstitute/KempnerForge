# Llama 7B benchmark on 4x H200 GPUs with fineweb-edu data.
# Usage: torchrun --nproc_per_node=4 scripts/train.py configs/train/llama7b_bench.toml

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8            # GQA (Llama 3 style)
vocab_size = 128256        # Llama 3 tokenizer
ffn_dim_multiplier = 1.3
max_seq_len = 2048
rope_theta = 500000.0

[train]
batch_size = 4
seq_len = 2048
max_steps = 50
grad_accum_steps = 2
grad_clip_norm = 1.0
seed = 42
compile_model = true
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
fused = true

[scheduler]
name = "cosine"
warmup_steps = 10
min_lr_ratio = 0.1

[data]
dataset_path = "data/fineweb_llama3"
num_workers = 4
pin_memory = true

[distributed]
dp_shard = -1

[checkpoint]
dir = "checkpoints/llama7b_bench"
interval = 1000
keep_last_n = 1

[metrics]
log_interval = 5
enable_wandb = false
enable_tensorboard = false
