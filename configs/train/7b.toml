# Llama-3 7B — general-purpose training config.
# Works on any GPU count (dp_shard=-1 auto-scales FSDP).
#
# Single GPU:  python scripts/train.py configs/train/7b.toml
# Single node: torchrun --nproc_per_node=4 scripts/train.py configs/train/7b.toml
# Multi-node:  sbatch --nodes=4 scripts/slurm/multinode.sh configs/train/7b.toml
#
# Quick test:  add --train.max_steps=50

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 4096
rope_theta = 500000.0
tie_embeddings = false

[train]
batch_size = 8
seq_len = 4096
max_steps = 100000
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = true
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 2000
min_lr_ratio = 0.1

[data]
dataset_path = "/path/to/tokenized/dataset"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
dp_replicate = 1
tp = 1
pp = 1

[checkpoint]
dir = "checkpoints/7b"
interval = 1000
async_mode = "async_with_pinned_mem"
keep_last_n = 3

[metrics]
log_interval = 10
enable_wandb = true
wandb_project = "kempnerforge"

[profiling]
enable = false
