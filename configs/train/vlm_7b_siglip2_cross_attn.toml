# 7B Llama-style backbone + SigLIP2 vision encoder, Cross-Attention VLM.
#
# Sibling of vlm_7b_siglip2.toml (Joint-Decoder) for the Cross-Attention
# arch. Image features flow as K/V into separate CrossAttentionBlocks
# at cadence 4 (n_layers=32 -> 8 CA blocks); the residual stream
# itself carries text only.
#
# Measured on 4x H200 (50-step smoke on 2k COCO Karpathy captions):
#   memory: ~37 / 140 GB per GPU (27%, full AC)
#   throughput: ~28k tok/s, ~33% MFU
#   model: 9.45B total, 9.36B trainable (encoder frozen)
# CA layers add 8 blocks (cadence=4 with n_layers=32). Real SigLIP2
# encoder feeds 196 tokens into the K/V side channel; residual stream
# carries text only.
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py \
#       configs/train/vlm_7b_siglip2_cross_attn.toml
#
# Defaults point at the public COCO Karpathy split on HF Hub. Override
# the dataset and tokenizer via CLI for other corpora:
#   --data.hf_dataset_name=<dataset> --data.tokenizer_path=<tokenizer>

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 2048      # CA residual stream is text-only (no image prefix)
rope_theta = 500000.0
tie_embeddings = false

[model.vlm]
arch = "cross_attention"
vision_encoder = "siglip2"
vision_encoder_path = "google/siglip2-base-patch16-224"
feature_dim = 768       # SigLIP2 base hidden size
num_tokens = 196        # 14x14 patches for 224-input
adapter_hidden_dim = 0  # 0 = use model.dim (4096)
adapter_activation = "gelu"
max_text_len = 2048
cross_attention_every_n_layers = 4
cross_attention_n_heads = 0
cross_attention_n_kv_heads = 0
freeze = [{module = "vision_encoder", frozen = true}]

[train]
batch_size = 4
seq_len = 2048           # text-only; matches max_text_len for CA
max_steps = 50           # smoke
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 2e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 5
min_lr_ratio = 0.1

[data]
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "meta-llama/Meta-Llama-3-8B"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
dp_replicate = 1
tp = 1
pp = 1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b_siglip2_cross_attn"
interval = 1000          # above max_steps; no checkpoint in this smoke
keep_last_n = 1

[metrics]
log_interval = 5
enable_wandb = false
enable_tensorboard = false
