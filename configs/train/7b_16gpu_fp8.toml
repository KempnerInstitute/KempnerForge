# Llama-3 7B — 16 GPUs (4 nodes × 4), FP8 + FSDP.
# FP8 compute (E4M3 forward, E5M2 backward) with bf16 master weights.
# FSDP2 float8 all-gather halves communication volume vs bf16.
#
# Usage:
#   srun --nodes=4 --ntasks-per-node=4 --gpus-per-node=4 \
#     uv run python scripts/train.py configs/train/7b_16gpu_fp8.toml
#
# Memory per GPU:
#   Sharded state (params+opt+grad): 7B × 16 bytes / 16 = 7 GB
#   Activations (selective AC): ~30-40 GB per GPU
#   Total peak: ~50-60 GB of 140 GB
#
# Tuning for FP8 tensor core utilization:
#   - batch_size=8 (not 4): doubles GEMM M-dimension → better TC saturation
#   - grad_accum_steps=2: keeps same effective batch (256 seq/step)
#   - full AC required at batch_size=8 (selective AC OOMs — MLP intermediates
#     across 32 layers exceed memory)

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
max_seq_len = 4096
rope_theta = 500000.0

[train]
batch_size = 8
seq_len = 4096
max_steps = 50
grad_accum_steps = 2
grad_clip_norm = 1.0
seed = 42
compile_model = true
mixed_precision = "fp8"
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 10
min_lr_ratio = 0.1

[data]
dataset_path = "/path/to/tokenized/dataset"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/7b_16gpu_fp8"
interval = 25
async_mode = "async_with_pinned_mem"
keep_last_n = 2

[metrics]
log_interval = 1
enable_wandb = true
wandb_project = "kempnerforge"
