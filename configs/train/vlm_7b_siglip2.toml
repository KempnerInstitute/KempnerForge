# 7B Llama-style backbone + SigLIP2 vision encoder, Joint-Decoder VLM.
#
# Target: 4-8 GPU single node via FSDP2. Pipeline parallelism with VLM is
# not supported on this branch (JobConfig.validate raises).
#
# Memory per GPU (4x GPU, bf16 params, bf16 activations with full AC):
#   Backbone sharded: 7B / 4 * 16 bytes = 28 GB
#   SigLIP2 vision tower (frozen): ~1.5 GB full replica per rank
#   Adapter: negligible
#   Leaves ~90 GB / H100 for activations and grad accumulation headroom.
#
# Usage:
#   uv run torchrun --nproc_per_node=4 scripts/train.py configs/train/vlm_7b_siglip2.toml
#
# Data:
#   Defaults point at COCO captions; swap for COYO-700M or LLaVA-style
#   datasets via CLI overrides.

[model]
dim = 4096
n_layers = 32
n_heads = 32
n_kv_heads = 8
vocab_size = 128256
ffn_dim_multiplier = 1.3
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 2304     # 256 image + 2048 text
rope_theta = 500000.0
tie_embeddings = false

[model.vlm]
arch = "joint_decoder"
vision_encoder = "siglip2"
vision_encoder_path = "google/siglip2-base-patch16-224"
feature_dim = 768       # SigLIP2 base hidden size
num_tokens = 196        # 14x14 patches for 224-input
adapter_hidden_dim = 0  # 0 = use model.dim (4096)
adapter_activation = "gelu"
max_text_len = 2048
freeze = [{module = "vision_encoder", frozen = true}]

[train]
batch_size = 4
seq_len = 2304
max_steps = 5000
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 2e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 200
min_lr_ratio = 0.1

[data]
hf_dataset_name = "nlphuji/coco_karpathy"
hf_dataset_split = "train"
hf_dataset_image_field = "image"
hf_dataset_text_field = "caption"
hf_image_size = 224
tokenizer_path = "meta-llama/Meta-Llama-3-8B"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = -1
dp_replicate = 1
tp = 1
pp = 1
nccl_timeout_sec = 600

[checkpoint]
dir = "checkpoints/vlm_7b_siglip2"
interval = 500
async_mode = "async_with_pinned_mem"
keep_last_n = 2

[metrics]
log_interval = 5
enable_wandb = true
wandb_project = "kempnerforge"
