# Llama-3 70B — 32 GPUs (8 nodes × 4), TP=4 × PP=4 × FSDP=2.
# 80 layers → 20 per PP stage.
# Alternative to 70b_32gpu_tp4.toml when memory is tight (less FSDP sharding).
#
# Usage: sbatch --nodes=8 scripts/slurm/multinode.sh configs/train/70b_32gpu_tp4_pp4.toml

[model]
dim = 8192
n_layers = 80
n_heads = 64
n_kv_heads = 8
vocab_size = 128256
ffn_hidden_dim = 28672
norm_type = "rmsnorm"
activation = "silu"
max_seq_len = 4096
rope_theta = 500000.0
tie_embeddings = false

[train]
batch_size = 1
seq_len = 4096
max_steps = 20
grad_accum_steps = 4
grad_clip_norm = 1.0
seed = 42
compile_model = false
activation_checkpointing = "full"

[optimizer]
name = "adamw"
lr = 1.5e-4
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8
fused = true

[scheduler]
name = "cosine"
warmup_steps = 50
min_lr_ratio = 0.1

[data]
dataset_path = "/n/holylfs06/LABS/kempner_shared/Everyone/testbed/text/fineweb-edu/tokenized/meta-llama-3/default"
file_pattern = "tokenized_*.bin"
num_workers = 4
pin_memory = true
prefetch_factor = 2

[distributed]
dp_shard = 2
dp_replicate = 1
tp = 4
pp = 4
pp_schedule = "1f1b"
nccl_timeout_sec = 1200

[checkpoint]
dir = "checkpoints/70b_32gpu_tp4_pp4"
interval = 100
async_mode = "disabled"
keep_last_n = 2

[metrics]
log_interval = 1
enable_wandb = false

[profiling]
enable = false
